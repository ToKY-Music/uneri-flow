<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>UNERI Flow - Emergent Particle Audio</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #0d0f18;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
    #ui-container {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #e0f0ff;
      pointer-events: none;
      text-shadow: 0 0 8px rgba(0,255,200,0.5);
    }
    h1 {
      margin: 0 0 6px 0;
      font-size: 1.2rem;
      letter-spacing: 0.1em;
      color: #7ef1d3;
    }
    p {
      margin: 0;
      font-size: 0.82rem;
      opacity: 0.8;
      line-height: 1.4;
    }
  </style>
  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

  <div id="ui-container">
    <h1>UNERI Flow</h1>
    <p>ドラッグ：うねりの注入<br>ピンチ / ホイール：画面の拡大・縮小</p>
  </div>

  <script>
    // ==========================================
    // 1. Web Audio API セットアップ
    // ==========================================
    let audioCtx = null;
    let masterFilter = null; // 全体のサウンドをマイルドにするフィルター

    function initAudio() {
      if (!audioCtx) {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (AudioContextClass) {
          audioCtx = new AudioContextClass();
          
          // 低音〜中音域を活かすローパスフィルター
          masterFilter = audioCtx.createBiquadFilter();
          masterFilter.type = 'lowpass';
          masterFilter.frequency.setValueAtTime(800, audioCtx.currentTime);
          masterFilter.connect(audioCtx.destination);
        }
      }
      if (audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    // ちび粒子発生時の「ポコッ」という可愛らしい発生音
    function playPokoSound(pitchRatio = 1.0) {
      if (!audioCtx || audioCtx.state !== 'running') return;

      try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        const baseFreq = 260 + Math.random() * 200;
        osc.frequency.setValueAtTime(baseFreq * pitchRatio, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(baseFreq * 2.6 * pitchRatio, audioCtx.currentTime + 0.06);

        gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.06);

        osc.connect(gain);
        gain.connect(masterFilter || audioCtx.destination);

        osc.start();
        osc.stop(audioCtx.currentTime + 0.07);
      } catch (e) {
        console.error("Audio play error:", e);
      }
    }

    // ==========================================
    // 2. Three.js セットアップ
    // ==========================================
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x0d0f18, 0.015);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    let targetZoom = 30;
    camera.position.set(0, 0, targetZoom);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    // ライティング
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.85);
    scene.add(ambientLight);

    const mainLight = new THREE.PointLight(0x7ef1d3, 2.5, 100);
    mainLight.position.set(0, 0, 20);
    scene.add(mainLight);

    // レイキャスト
    const raycaster = new THREE.Raycaster();
    const mousePlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
    const pointer = new THREE.Vector2();
    const intersectPoint = new THREE.Vector3();

    // ==========================================
    // 3. 各粒子が独立音源を持つ群集モデル
    // ==========================================
    const MAX_PARTICLES = 1400; // オーディオパフォーマンスとのバランスをとった最大数
    const particles = [];

    const sphereGeo = new THREE.SphereGeometry(0.28, 12, 12);
    const particleMat = new THREE.MeshPhongMaterial({
      color: 0x7ef1d3,
      emissive: 0x052218,
      shininess: 90,
      transparent: true,
      opacity: 0.85
    });

    class ChibiParticle {
      constructor(x, y, z, initialVel) {
        this.mesh = new THREE.Mesh(sphereGeo, particleMat.clone());
        this.mesh.position.set(x, y, z);
        
        this.mesh.material.color.setHSL(0.40 + Math.random() * 0.18, 0.8, 0.65);

        this.velocity = initialVel.clone().add(new THREE.Vector3(
          (Math.random() - 0.5) * 0.15,
          (Math.random() - 0.5) * 0.15,
          (Math.random() - 0.5) * 0.05
        ));

        this.life = 1.0;
        this.decay = 0.001 + Math.random() * 0.0012;

        // --- ① 一つ一つの粒子専用の微小音源（Web Audio）---
        this.baseFreq = 80 + Math.random() * 120; // 粒子ごとの個性（周波数の個体差）
        this.osc = null;
        this.gain = null;

        if (audioCtx && audioCtx.state === 'running') {
          try {
            this.osc = audioCtx.createOscillator();
            this.gain = audioCtx.createGain();

            // ザーッというざらつきを生む三角波
            this.osc.type = 'triangle';
            this.osc.frequency.setValueAtTime(this.baseFreq, audioCtx.currentTime);

            // 音源は「ごく微弱」に設定（数千個合わさってちょうど良い音量に）
            this.gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);

            this.osc.connect(this.gain);
            this.gain.connect(masterFilter || audioCtx.destination);
            this.osc.start();
          } catch (e) {
            this.osc = null;
          }
        }
      }

      applyFlockingRule(neighbors, bounds) {
        const cohesion = new THREE.Vector3();
        const separation = new THREE.Vector3();
        const alignment = new THREE.Vector3();
        let count = 0;

        for (let i = 0; i < neighbors.length; i++) {
          const other = neighbors[i];
          const dist = this.mesh.position.distanceTo(other.mesh.position);

          if (dist > 0 && dist < 5.0) {
            cohesion.add(other.mesh.position);
            alignment.add(other.velocity);

            if (dist < 1.1) {
              const pushAway = new THREE.Vector3().subVectors(this.mesh.position, other.mesh.position);
              pushAway.normalize().divideScalar(dist);
              separation.add(pushAway);
            }
            count++;
          }
        }

        if (count > 0) {
          cohesion.divideScalar(count);
          const cohesionForce = new THREE.Vector3().subVectors(cohesion, this.mesh.position).multiplyScalar(0.007);
          this.velocity.add(cohesionForce);

          alignment.divideScalar(count).multiplyScalar(0.035);
          this.velocity.add(alignment);

          separation.multiplyScalar(0.035);
          this.velocity.add(separation);
        }

        // ソフトバウンダリ（画面境界）
        const marginX = bounds.x;
        const marginY = bounds.y;

        if (Math.abs(this.mesh.position.x) > marginX) {
          const pushCenter = -Math.sign(this.mesh.position.x) * 0.012 * (Math.abs(this.mesh.position.x) - marginX);
          this.velocity.x += pushCenter;
        }
        if (Math.abs(this.mesh.position.y) > marginY) {
          const pushCenter = -Math.sign(this.mesh.position.y) * 0.012 * (Math.abs(this.mesh.position.y) - marginY);
          this.velocity.y += pushCenter;
        }
      }

      update() {
        this.velocity.multiplyScalar(0.965);
        this.mesh.position.add(this.velocity);

        // 寿命と透明度
        this.life -= this.decay;
        this.mesh.material.opacity = Math.max(0, this.life * 0.85);

        // --- 個別粒子の移動速度に応じた「リアルタイム音高（ピッチ）・音量変化」 ---
        const speed = this.velocity.length();
        if (this.osc && audioCtx && audioCtx.state === 'running') {
          // 速度が上がると音高が高くなる (基本周波数 ＋ 速度補正)
          const currentFreq = this.baseFreq + (speed * 450);
          this.osc.frequency.setTargetAtTime(currentFreq, audioCtx.currentTime, 0.05);

          // 速度と寿命に応じてごく微弱に音量を制御
          const targetVol = Math.min(0.0005 + (speed * 0.008), 0.004) * Math.max(0, this.life);
          this.gain.gain.setTargetAtTime(targetVol, audioCtx.currentTime, 0.05);
        }

        return this.life > 0;
      }

      destroy() {
        // オシレーターの安全な破棄
        if (this.osc) {
          try {
            this.gain.gain.setTargetAtTime(0.0, audioCtx.currentTime, 0.02);
            setTimeout(() => {
              if (this.osc) {
                this.osc.stop();
                this.osc.disconnect();
                this.gain.disconnect();
              }
            }, 30);
          } catch (e) {}
        }

        scene.remove(this.mesh);
        this.mesh.geometry.dispose();
        this.mesh.material.dispose();
      }
    }

    // ==========================================
    // 4. 操作（ピンチズーム・ホイール・ドラッグ）
    // ==========================================
    let isInteracting = false;
    let lastPos = new THREE.Vector3();
    let dragVelocity = new THREE.Vector3();
    let initialPinchDistance = null;

    function getPointerPos(e) {
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      pointer.x = (clientX / window.innerWidth) * 2 - 1;
      pointer.y = -(clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);
      raycaster.ray.intersectPlane(mousePlane, intersectPoint);
    }

    function getTouchDistance(e) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      return Math.sqrt(dx * dx + dy * dy);
    }

    function onPointerDown(e) {
      initAudio();

      if (e.touches && e.touches.length === 2) {
        isInteracting = false;
        initialPinchDistance = getTouchDistance(e);
        return;
      }

      isInteracting = true;
      getPointerPos(e);
      lastPos.copy(intersectPoint);
      dragVelocity.set(0, 0, 0);

      spawnCluster(intersectPoint, 6, new THREE.Vector3());
    }

    function onPointerMove(e) {
      if (e.touches && e.touches.length === 2) {
        if (initialPinchDistance) {
          const newDistance = getTouchDistance(e);
          const factor = (initialPinchDistance - newDistance) * 0.08;
          targetZoom = Math.max(10, Math.min(80, targetZoom + factor));
          initialPinchDistance = newDistance;
        }
        return;
      }

      if (!isInteracting) return;
      getPointerPos(e);

      dragVelocity.subVectors(intersectPoint, lastPos);

      if (dragVelocity.lengthSq() > 0.04) {
        const count = Math.min(Math.floor(dragVelocity.length() * 5) + 2, 7);
        spawnCluster(intersectPoint, count, dragVelocity.clone().multiplyScalar(0.3));
        lastPos.copy(intersectPoint);
      }
    }

    function onPointerUp(e) {
      if (e.touches && e.touches.length < 2) {
        initialPinchDistance = null;
      }
      if (!e.touches || e.touches.length === 0) {
        isInteracting = false;
      }
    }

    window.addEventListener('wheel', (e) => {
      initAudio();
      targetZoom += e.deltaY * 0.03;
      targetZoom = Math.max(10, Math.min(80, targetZoom));
    }, { passive: true });

    function spawnCluster(pos, count, impulse) {
      for (let i = 0; i < count; i++) {
        if (particles.length >= MAX_PARTICLES) {
          const oldest = particles.shift();
          oldest.destroy();
        }

        const offset = new THREE.Vector3(
          (Math.random() - 0.5) * 1.5,
          (Math.random() - 0.5) * 1.5,
          (Math.random() - 0.5) * 0.5
        );
        const spawnPos = pos.clone().add(offset);
        const p = new ChibiParticle(spawnPos.x, spawnPos.y, spawnPos.z, impulse);

        scene.add(p.mesh);
        particles.push(p);
      }
      
      const speedPitch = 0.85 + Math.min(impulse.length() * 1.2, 0.7);
      playPokoSound(speedPitch);
    }

    // イベント登録
    window.addEventListener('pointerdown', onPointerDown);
    window.addEventListener('pointermove', onPointerMove);
    window.addEventListener('pointerup', onPointerUp);
    
    window.addEventListener('touchstart', (e) => {
      initAudio();
      if (e.touches.length === 2) initialPinchDistance = getTouchDistance(e);
    }, { passive: true });
    window.addEventListener('touchmove', onPointerMove, { passive: true });
    window.addEventListener('touchend', onPointerUp, { passive: true });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ==========================================
    // 5. メイン計算ループ
    // ==========================================
    function animate() {
      requestAnimationFrame(animate);

      // カメラズーム補間
      camera.position.z += (targetZoom - camera.position.z) * 0.1;

      // 限界境界値の計算
      const vFOV = THREE.MathUtils.degToRad(camera.fov);
      const visibleHeight = 2 * Math.tan(vFOV / 2) * camera.position.z;
      const visibleWidth = visibleHeight * camera.aspect;
      const bounds = { x: (visibleWidth / 2) * 0.82, y: (visibleHeight / 2) * 0.82 };

      // 近接相互作用計算
      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        
        const neighbors = [];
        for (let j = 0; j < particles.length; j += 2) { 
          if (i !== j) neighbors.push(particles[j]);
        }
        
        p.applyFlockingRule(neighbors, bounds);
      }

      // 位置・音響更新・生存判定
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        const alive = p.update();

        if (!alive) {
          p.destroy();
          particles.splice(i, 1);
        }
      }

      // ライティング追従
      if (particles.length > 0) {
        const avgPos = new THREE.Vector3();
        for (let i = 0; i < particles.length; i++) {
          avgPos.add(particles[i].mesh.position);
        }
        avgPos.divideScalar(particles.length);
        mainLight.position.lerp(avgPos, 0.05);
        mainLight.position.z = camera.position.z * 0.6;
      }

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
