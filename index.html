<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>UNERI Flow - Genesis Mode Prototype</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #0d0f18;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
    #ui-container {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #e0f0ff;
      pointer-events: none;
      text-shadow: 0 0 8px rgba(0,255,200,0.5);
    }
    h1 {
      margin: 0 0 6px 0;
      font-size: 1.2rem;
      letter-spacing: 0.1em;
      color: #7ef1d3;
    }
    p {
      margin: 0;
      font-size: 0.85rem;
      opacity: 0.8;
    }
  </style>
  <!-- Three.js (3Dグラフィックスライブラリ) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

  <div id="ui-container">
    <h1>UNERI Flow - Genesis</h1>
    <p>画面をタップ / ドラッグして「うねり」を注ぎ込んでください</p>
  </div>

  <script>
    // ==========================================
    // 1. Web Audio API (iOS Safari対応強化)
    // ==========================================
    let audioCtx = null;

    function initAudio() {
      if (!audioCtx) {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (AudioContextClass) {
          audioCtx = new AudioContextClass();
        }
      }
      // iOS Safari等で suspended になっているサウンドコンテキストを解凍する
      if (audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    // ちび粒子が発生するときの「ポコッ」という音
    function playPokoSound(pitchRatio = 1.0) {
      if (!audioCtx || audioCtx.state !== 'running') return;

      try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        // ポコポコ感を生むサイン波＋急激な周波数変化
        const baseFreq = 280 + Math.random() * 220;
        osc.frequency.setValueAtTime(baseFreq * pitchRatio, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(baseFreq * 2.8 * pitchRatio, audioCtx.currentTime + 0.07);

        gain.gain.setValueAtTime(0.18, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.07);

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start();
        osc.stop(audioCtx.currentTime + 0.08);
      } catch (e) {
        console.error("Audio play error:", e);
      }
    }

    // ==========================================
    // 2. Three.js セットアップ
    // ==========================================
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x0d0f18, 0.025);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 25);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    // ライティング（光の当たり方でちび粒子の立体感・ツヤを強調）
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambientLight);

    const mainLight = new THREE.PointLight(0x7ef1d3, 2, 60);
    mainLight.position.set(0, 10, 15);
    scene.add(mainLight);

    // レイキャスト（タッチ位置の3D座標計算）
    const raycaster = new THREE.Raycaster();
    const mousePlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
    const pointer = new THREE.Vector2();
    const intersectPoint = new THREE.Vector3();

    // ==========================================
    // 3. 数理・粒子モデル（ちび粒子群による創発）
    // ==========================================
    const MAX_PARTICLES = 1000;
    const particles = [];
    
    // ちび粒子の共通ジオメトリ（サイズは統一固定）
    const sphereGeo = new THREE.SphereGeometry(0.3, 16, 16);
    
    // ちび粒子マテリアル（透き通る質感）
    const particleMat = new THREE.MeshPhongMaterial({
      color: 0x7ef1d3,
      emissive: 0x052218,
      shininess: 100,
      transparent: true,
      opacity: 0.85
    });

    // 群全体の「中心（定常波の核となる位置）」を記憶するベクトル
    let mesoCenter = new THREE.Vector3(0, 0, 0);

    class ChibiParticle {
      constructor(x, y, z) {
        this.mesh = new THREE.Mesh(sphereGeo, particleMat.clone());
        this.mesh.position.set(x, y, z);
        
        // サイズ変更は行わず、わずかな個性付け（色ブレ）のみ
        this.mesh.material.color.setHSL(0.42 + Math.random() * 0.15, 0.85, 0.65);

        // 初期速度
        this.velocity = new THREE.Vector3(
          (Math.random() - 0.5) * 0.3,
          (Math.random() - 0.5) * 0.3,
          (Math.random() - 0.5) * 0.1
        );
        this.life = 1.0;
        this.decay = 0.0015 + Math.random() * 0.002;
      }

      update(centerPoint) {
        // --- 粒子自体の相互作用・流動計算 ---

        // 1. 群れの中心（メゾ・定常波の発生場所）に引き寄せられるベクトル
        const toCenter = new THREE.Vector3().subVectors(centerPoint, this.mesh.position);
        const distSq = toCenter.lengthSq() + 0.1;
        
        // 近づきすぎると反発し、離れすぎると引き寄せる（密度の定常化）
        const forceMagnitude = (distSq - 9.0) * 0.003; 
        toCenter.normalize().multiplyScalar(forceMagnitude);

        // 2. 渦を作る旋回成分（ウネリの角運動量）
        const vortex = new THREE.Vector3(-toCenter.y, toCenter.x, 0).multiplyScalar(0.2);

        // 3. 合成して速度更新
        this.velocity.add(toCenter);
        this.velocity.add(vortex);
        this.velocity.multiplyScalar(0.95); // 粘性・流体抵抗
        
        this.mesh.position.add(this.velocity);

        // 4. 生死サイクルと透明度
        this.life -= this.decay;
        this.mesh.material.opacity = Math.max(0, this.life * 0.85);

        return this.life > 0;
      }

      destroy() {
        scene.remove(this.mesh);
        this.mesh.geometry.dispose();
        this.mesh.material.dispose();
      }
    }

    // ==========================================
    // 4. ユーザー操作（iOS/Android Touch対応）
    // ==========================================
    let isInteracting = false;
    let lastSpawnTime = 0;

    function getPointerPos(e) {
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      pointer.x = (clientX / window.innerWidth) * 2 - 1;
      pointer.y = -(clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);
      raycaster.ray.intersectPlane(mousePlane, intersectPoint);
    }

    function onPointerDown(e) {
      // タッチ開始時にオーディオを有効化（iOS対策）
      initAudio();
      
      isInteracting = true;
      getPointerPos(e);
      spawnParticles(intersectPoint, 6);
    }

    function onPointerMove(e) {
      if (!isInteracting) return;
      getPointerPos(e);
      
      const now = performance.now();
      if (now - lastSpawnTime > 45) { // 連続生成の間隔
        spawnParticles(intersectPoint, 3);
        lastSpawnTime = now;
      }
    }

    function onPointerUp() {
      isInteracting = false;
    }

    function spawnParticles(pos, count) {
      for (let i = 0; i < count; i++) {
        if (particles.length >= MAX_PARTICLES) {
          const oldest = particles.shift();
          oldest.destroy();
        }
        
        const offset = new THREE.Vector3(
          (Math.random() - 0.5) * 1.8,
          (Math.random() - 0.5) * 1.8,
          (Math.random() - 0.5) * 0.5
        );
        const spawnPos = pos.clone().add(offset);
        const p = new ChibiParticle(spawnPos.x, spawnPos.y, spawnPos.z);
        
        scene.add(p.mesh);
        particles.push(p);
      }
      playPokoSound(0.85 + Math.random() * 0.35);
    }

    // イベント登録（iOS/PointerEvents両対応）
    window.addEventListener('pointerdown', onPointerDown);
    window.addEventListener('pointermove', onPointerMove);
    window.addEventListener('pointerup', onPointerUp);
    
    // iOS Safari のタッチイベント直接拾い
    window.addEventListener('touchstart', (e) => { initAudio(); }, { passive: true });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ==========================================
    // 5. メインループ（定常波の自動計算）
    // ==========================================
    function animate() {
      requestAnimationFrame(animate);

      // 1. 全粒子の平均座標から「メゾの中心（定常波の中心）」を計算
      if (particles.length > 0) {
        const sumPos = new THREE.Vector3();
        for (let i = 0; i < particles.length; i++) {
          sumPos.add(particles[i].mesh.position);
        }
        const currentCenter = sumPos.divideScalar(particles.length);
        // 定常波の中心を緩やかに補間移動（滑らかなうねりの移動）
        mesoCenter.lerp(currentCenter, 0.08);
      } else {
        mesoCenter.lerp(new THREE.Vector3(0, 0, 0), 0.05);
      }

      // 2. 粒子の更新
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        const alive = p.update(mesoCenter);
        
        if (!alive) {
          p.destroy();
          particles.splice(i, 1);
        }
      }

      // 3. ポイントライトを中心（うねりの濃い部分）へ追従させ、密度感を強調
      mainLight.position.lerp(mesoCenter, 0.1);
      mainLight.position.z = 10;

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
